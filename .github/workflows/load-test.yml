name: Load Tests

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL for load testing'
        required: false
        default: 'http://localhost:5555'

jobs:
  k6-load-test:
    name: k6 Load Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run k6 load test
        uses: grafana/k6-action@v0.2.0
        with:
          filename: k6/load-test.js
          flags: --env TARGET_URL=${{ inputs.target_url || 'http://localhost:5555' }}

  k6-stress-test:
    name: k6 Stress Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run k6 stress test
        uses: grafana/k6-action@v0.2.0
        with:
          filename: k6/stress-test.js
          flags: --env TARGET_URL=${{ inputs.target_url || 'http://localhost:5555' }}